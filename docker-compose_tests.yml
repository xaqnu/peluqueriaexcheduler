services:
  postgres:
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: peluqueriaschedulertest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/datatests
volumes:
  postgres_data:
